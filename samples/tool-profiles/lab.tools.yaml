execution:
  requires_real_hardware: true
  allow_env: EMBSW_TESTER_ALLOW_REAL_HARDWARE
  notes: "Integrated lab smoke profile. Edit ports, paths, and Vector/INCA/Trace32 settings before running."

serial:
  devices:
    psu:
      device_type: power_supply
      port: COM3
      baudrate: 9600
      parity: none
      stop_bits: 1
      byte_size: 8
      line_ending: lf
      write_flush: true
      timeout_ms: 1000
      command_profile: vupower_k_usb
      notes: "VuPower K Series USB-to-Serial SCPI-style protocol. If the PSU does not receive commands, try line_ending: crlf and optional dtr/rts settings."
    sent_usb:
      device_type: mach_systems_sent_usb
      port: COM4
      baudrate: 115200
      parity: none
      stop_bits: 1
      byte_size: 8
      timeout_ms: 1000
      command_profile: mach_sent_gateway
      notes: "Mach Systems SENT-USB interface using the SENT Gateway binary protocol."

trace32:
  rcl:
    enabled: true
    client_factory: lab_trace32:create_client
    command_method: cmd
    client_args:
      node: TRACE32-A
  udp:
    enabled: true
    host: 127.0.0.1
    port: 20000
    terminator: "\n"
    encoding: utf-8
    response_bytes: 4096

inca:
  helper:
    enabled: true
    command:
      - C:/Python32/python.exe
      - -m
      - embsw_tester.adapters.inca_com_helper

canoe:
  helper:
    enabled: true
    application: canoe
    command:
      - python
      - -m
      - embsw_tester.adapters.canoe_com_helper

command_defaults:
  serial.write:
    timeout_ms: 1000
  serial.read:
    timeout_ms: 1000
  canoe.measurement.stop:
    timeout_ms: 1000
  canoe.signal.read:
    timeout_ms: 1000
  canoe.sysvar.read:
    timeout_ms: 1000
  canoe.sysvar.set:
    timeout_ms: 1000
  inca.measure.read:
    timeout_ms: 1000
  inca.calibration.set:
    timeout_ms: 1000
    value_kind: phys
  inca.recording.start:
    timeout_ms: 1000
    file_format: MDF
  inca.recording.stop:
    timeout_ms: 1000
    file_format: MDF4
  trace32.command:
    timeout_ms: 1000
    transport: rcl
    fallback: true
  trace32.command_sequence:
    timeout_ms: 1000
    transport: rcl
    fallback: true

command_profiles:
  vupower_k_usb:
    notes: "VuPower K USB manual Ver3.2. Commands are line-based and terminated by LF."
    commands:
      power_supply.command:
        protocol: vupower_k_usb
        channel: P1
        timeout_ms: 1000
  mach_sent_gateway:
    notes: "Mach Systems SENT Gateway protocol. Supports fast frame receive, fast TX, single slow TX, and slow multiplex buffer TX commands."
    commands:
      sent_usb.read:
        protocol: mach_sent_gateway
        channel: 1
        timeout_ms: 1000
        max_frames: 3
      sent_usb.command:
        protocol: mach_sent_gateway
        read_ack: true
        timeout_ms: 1000
