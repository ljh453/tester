functions:
  add_channel:
    params: [running_total, channel]
    returns: [next_total, channel_label]
    steps:
      - set:
          var: next_total
          value: "${running_total + channel}"
      - delay:
          ms: 1000
      - set:
          var: channel_label
          value: "channel-{{ channel }}"

  make_summary:
    params: [total, expected_total]
    returns: [summary_text, total_ok]
    steps:
      - set:
          var: total_ok
          value: "${total == expected_total}"
      - delay:
          ms: 1000
      - set:
          var: summary_text
          value: "total={{ total }}, expected={{ expected_total }}"

testcases:
  - name: gui_control_flow_demo
    description: Pure runtime sample for checking GUI execution line and local variables.
    tags: [gui, control-flow, sample]
    preconditions:
      - log.text:
          text: "Preparing control-flow GUI demo"
      - delay:
          ms: 1000
      - set:
          var: expected_total
          value: 6
      - delay:
          ms: 1000
      - set:
          var: channels
          value: [1, 2, 3]
      - delay:
          ms: 1000
      - set:
          var: channel_sum
          value: 0
      - delay:
          ms: 1000
      - set:
          var: iterations
          value: 0
    steps:
      - for:
          each: "${channels}"
          as: channel
          do:
            - call:
                function: add_channel
                args:
                  running_total: "${channel_sum}"
                  channel: "${channel}"
                out:
                  next_total: channel_sum
                  channel_label: last_channel_label
            - delay:
                ms: 1000
            - set:
                var: iterations
                value: "${iterations + 1}"
            - delay:
                ms: 1000
            - log.value:
                name: loop_state
                value: "{{ last_channel_label }} sum={{ channel_sum }}"
            - delay:
                ms: 1000
      - delay:
          ms: 1000
      - call:
          function: make_summary
          args:
            total: "${channel_sum}"
            expected_total: "${expected_total}"
          out:
            summary_text: summary_text
            total_ok: total_ok
      - delay:
          ms: 1000
      - assert.eq:
          left: "${total_ok}"
          right: true
      - delay:
          ms: 1000
      - assert.eq:
          left: "${iterations}"
          right: 3
    postconditions:
      - log.value:
          name: summary_text
          value: "${summary_text}"
      - delay:
          ms: 1000
      - log.value:
          name: last_channel_label
          value: "${last_channel_label}"
