tool_profile: tool-profiles/lab-serial.tools.yaml

imports:
  - libs/common-power-sequence.yaml

testcases:
  - name: workbench_trace_variables_demo
    description: GUI workbench demo for Problems, Execution Trace, Variables, and Report views.
    tags: [gui, smoke, mock]
    preconditions:
      - log.text:
          text: "Preparing GUI workbench demo run"
      - set:
          var: rpm_min
          value: 700
    steps:
      - call:
          function: power_on
          args:
            channel: 1
          out:
            voltage_ok: power_ready
      - assert.eq:
          left: "${power_ready}"
          right: true
      - canoe.measurement.start:
          configuration: "samples/tool-profiles/lab-serial.tools.yaml"
      - canoe.sysvar.set:
          namespace: Demo
          name: Ignition
          value: true
      - inca.calibration.set:
          parameter: IdleTargetRpm
          value: 850
      - trace32.command:
          command: "STATE()"
          save_as: trace32_state
      - set:
          var: measured_rpm
          value: 1250
      - assert.gt:
          left: "${measured_rpm}"
          right: "${rpm_min}"
    postconditions:
      - log.value:
          name: measured_rpm
          value: "${measured_rpm}"
      - canoe.measurement.stop: {}
    cleanup:
      - power_supply.command:
          device: psu
          action: output
          channel: 1
          state: off

  - name: sent_gateway_command_demo
    description: Mock-friendly Mach SENT Gateway command sequence for GUI trace inspection.
    tags: [gui, sent, mock]
    preconditions:
      - log.text:
          text: "Configuring SENT channel in TX mode"
    steps:
      - sent_usb.command:
          device: sent_usb
          action: config
          channel: 1
          direction: tx
          data_nibble_count: 6
          unit_time_us: 3.0
          read_ack: false
      - sent_usb.command:
          device: sent_usb
          action: start
          channel: 1
          read_ack: false
      - sent_usb.command:
          device: sent_usb
          action: transmit_fast
          channel: 1
          status: 3
          data_nibbles: [1, 2, 3, 4, 5, 6]
          crc: 10
          crc_calculated: 11
          read_ack: false
      - sent_usb.command:
          device: sent_usb
          action: transmit_slow
          channel: 1
          slow_message_id: 18
          data: 13398
          slow_frame_type: enhanced_serial
          enhanced_format: true
          crc_received: 37
          crc_calculated: 44
          read_ack: false
      - set:
          var: sent_demo_ok
          value: true
      - assert.eq:
          left: "${sent_demo_ok}"
          right: true
    postconditions:
      - log.value:
          name: sent_demo_ok
          value: "${sent_demo_ok}"
    cleanup:
      - sent_usb.command:
          device: sent_usb
          action: stop
          channel: 1
          read_ack: false
